name: Release

on:
  push:
    tags:
      - 'v*'

env:
  GO_VERSION: "1.26"
  NODE_VERSION: "22"
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository_owner }}/agentops-console

permissions:
  contents: write
  packages: write

jobs:
  check:
    name: Build & Vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Build
        run: CGO_ENABLED=0 go build -o console ./cmd/console/
      - name: Vet
        run: go vet ./...

  docker:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: [check]
    steps:
      - uses: actions/checkout@v4
      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.version.outputs.version }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  helm-chart:
    name: Package & Push Helm Chart
    needs: [check]
    uses: samyn92/.github/.github/workflows/helm-release.yaml@main
    with:
      chart-path: helm/agentops-console
    secrets:
      registry-token: ${{ secrets.GITHUB_TOKEN }}

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [docker, helm-chart]
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "agentops-console ${{ github.ref_name }}" \
            --generate-notes

  # =========================================================================
  # Notify: dispatch version bump to agentops-platform
  # =========================================================================
  notify-platform:
    name: Notify Platform
    runs-on: ubuntu-latest
    needs: [release]
    steps:
      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Dispatch to agentops-platform
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.PLATFORM_DISPATCH_TOKEN }}
          repository: samyn92/agentops-platform
          event-type: dependency-update
          client-payload: |
            {
              "component": "agentops-console",
              "version": "${{ steps.version.outputs.version }}",
              "source": "agentops-console"
            }
