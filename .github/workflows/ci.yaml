name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GO_VERSION: "1.26"
  NODE_VERSION: "22"
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository_owner }}/agentops-console

jobs:
  # =========================================================================
  # Go: vet + build
  # =========================================================================
  go-check:
    name: Go Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Drop local replace directives
        run: go mod edit -dropreplace github.com/samyn92/agentops-core && go mod tidy
      - name: Vet
        run: go vet ./...
      - name: Build
        run: CGO_ENABLED=0 go build -o console ./cmd/console/

  # =========================================================================
  # Frontend: type-check + build
  # =========================================================================
  frontend-check:
    name: Frontend Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: npx tsc -b --noEmit
      - name: Build
        run: npx vite build

  # =========================================================================
  # Helm: lint + template
  # =========================================================================
  helm-chart:
    name: Helm Chart
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.17.3
      - name: Helm Lint
        run: helm lint helm/agentops-console
      - name: Helm Template
        run: helm template test helm/agentops-console --namespace agent-system

  # =========================================================================
  # Docker: build and push image (main branch only)
  # =========================================================================
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [go-check, frontend-check]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
