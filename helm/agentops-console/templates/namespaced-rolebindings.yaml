{{- if and .Values.rbac.create .Values.rbac.namespaced -}}
{{- $fullName := include "agentops-console.fullname" . -}}
{{- $labels := include "agentops-console.labels" . -}}
{{- $saName := include "agentops-console.serviceAccountName" . -}}
{{- range .Values.rbac.watchNamespaces }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $fullName }}
  namespace: {{ . }}
  labels:
    {{- $labels | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $fullName }}
subjects:
- kind: ServiceAccount
  name: {{ $saName }}
  namespace: {{ $.Release.Namespace }}
{{- end }}
{{- end }}
