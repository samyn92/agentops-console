{{- if and .Values.rbac.create (not .Values.rbac.namespaced) }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "agentops-console.fullname" . }}
  labels:
    {{- include "agentops-console.labels" . | nindent 4 }}
rules:
  {{- include "agentops-console.rbacRules" . | nindent 2 }}
{{- end }}
